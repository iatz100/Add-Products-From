<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    

<style>    
.generator-box *{ box-sizing:border-box; }    

.generator-box{    
  width:100%;    
  max-width:900px;    
  margin:20px auto;    
  padding:15px;    
  border-radius:12px;    
  box-shadow:0 5px 20px rgba(0,0,0,0.08);    
  background:rgba(255,255,255,0.95);    
}    

.generator-box input,    
.generator-box select,    
.generator-box textarea{    
  width:100%;    
  padding:10px;    
  margin:8px 0;    
  border-radius:8px;    
  border:1px solid #ddd;    
}    

.generator-box button{    
  width:100%;    
  padding:10px;    
  margin:5px 0;    
  border:none;    
  border-radius:6px;    
  background:linear-gradient(45deg,#6161e4,#28b463);    
  color:#fff;    
  font-weight:bold;    
  cursor:pointer;    
}    

.copy-btn{ background:#222 !important; }    
.add-btn{ background:#444 !important; }    
.remove-btn{ background:#4682B4 !important; margin-top:6px; }    

.btn-row{    
  display:flex;    
  gap:10px;    
  margin-top:10px;    
}    

.btn-row button{    
  flex:1;    
  width:auto !important;    
  margin:5px 0;    
}    

.field-group{    
  background:#f7f7f7;    
  padding:10px;    
  margin-bottom:10px;    
  border-radius:8px;    
}    

.upload-row{    
  display:flex;    
  align-items:center;    
  gap:10px;    
}    

.upload-row input{ flex:1; }    

.status{    
  font-size:18px;    
  min-width:30px;    
  text-align:center;    
  flex-shrink:0;    
}    

.generator-box textarea{    
  min-height:80px;    
  max-height:500px;    
  resize:none;    
  overflow:hidden;    
}    

@media (max-width:480px){    
  .generator-box{ padding:10px; margin:10px auto; }    
  .btn-row{ flex-direction:row; }    
}    

@media (max-width:768px){    
  .generator-box{ max-width:95%; }    
}    

body{    
  background: linear-gradient(135deg,#eef2f3,#dfe9f3) !important;    
}    

#outer-wrapper,    
.main-wrapper{    
  background: transparent !important;    
}    
</style>    

<div class="generator-box">    

<h2 style="text-align:center;color:#ff0000;">Add Products From</h2>    

<label>Product Image <span style="font-size:12px; color:red;">(Max file size: 1 MB)</span></label>    

<div class="field-group">    
<div class="upload-row">    
<input type="file" onchange="uploadImage(this,'main')">    
<span class="status"></span>    
</div>    
</div>    

<div id="imageFields"></div>    
<button class="add-btn" onclick="addImage()">✚ Add Image</button>    

<!-- Product Title - Fixed two input boxes -->
<label>Product Title</label>
<div id="titleFields">
  <div class="field-group">
    <input type="text" class="title-label" placeholder="Label Name" value="পণ্যের নাম">
    <input type="text" class="title-value" placeholder="Product Name">
  </div>
</div>
  
<div id="dynamicFields"></div>    
<button class="add-btn" onclick="addField()">✚ Add Field</button>    

<input type="text" id="pdf" placeholder="PDF File ID">    
<input type="text" id="price" placeholder="Price">    

<label>Discount</label>    
<div id="discountContainer">    
<input type="text" id="discount" placeholder="Example: 20">    
</div>    

<label>Stock</label>    
<select id="stock" onchange="handleStockChange()">    
<option value="instock">In Stock</option>    
<option value="stockout">Stock Out</option>    
</select>    

<br>    

<div class="btn-row">    
<button onclick="generateHTML()">Generate HTML</button>    
<button class="copy-btn" onclick="copyHTML()" id="copyBtn">📋 Copy</button>    
<button onclick="loadFromHTML()">Load</button>    
</div>    

<textarea id="output" placeholder="Generated HTML..."></textarea>    

<div id="seoBox" style="display:none; margin-top:20px;">    
<h3>🔗 SEO Settings</h3>    

<label>Permalink</label>    
<input type="text" id="permalink">    

<label>Search Description</label>    
<textarea id="metaDesc"></textarea>    
</div>    

</div>    

<script>  

const apiKey="a5b3fb9ec65e94a6cd657d8dab7e8253";  
let imageUrls={main:"",list:[]};  

function decodeHTML(html){  
let txt=document.createElement("textarea");  
txt.innerHTML=html;  
return txt.value;  
}  

// ✅ Upload Image  
async function uploadImage(input,type){  
let file=input.files[0];  

if(file.size > 1 * 1024 * 1024){  
alert("Image must be under 1MB");  
input.value="";  
return;  
}  

let status=input.parentElement.querySelector(".status");  
if(!file) return;  

status.innerHTML="⏳";  

let fd=new FormData();  
fd.append("image",file);  

try{  
let res=await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`,{  
method:"POST",  
body:fd  
});  
let data=await res.json();  

if(data.success){  
let url=data.data.url;  
status.innerHTML="✅";  

if(type==="main") imageUrls.main=url;  
else imageUrls.list.push(url);  

}else status.innerHTML="❌";  

}catch{  
status.innerHTML="❌";  
}  
}  

// ✅ Add Image Field  
function addImage(){  
let c=document.getElementById("imageFields");  
let d=document.createElement("div");  
d.className="field-group";  

d.innerHTML=`  
<div class="upload-row">  
<input type="file" onchange="uploadImage(this,'multi')">  
<span class="status"></span>  
</div>  
<button class="remove-btn" onclick="this.parentElement.remove()">Remove</button>`;  

c.appendChild(d);  
}  

// ✅ Add Dynamic Field  
function addField(){  
let c=document.getElementById("dynamicFields");  
let d=document.createElement("div");  
d.className="field-group";  

d.innerHTML=`  
<input type="text" class="field-label" placeholder="Label">  
<input type="text" class="field-value" placeholder="Value">  
<button class="remove-btn" onclick="this.parentElement.remove()">Remove</button>`;  

c.appendChild(d);  
}  

// STOCK    
function handleStockChange(){    
let stock=document.getElementById("stock").value;    
let c=document.getElementById("discountContainer");    
    
if(stock==="stockout"){    
c.innerHTML=`<select id="discount"><option>Stock Out!</option></select>`;    
}else{    
c.innerHTML=`<input type="text" id="discount" placeholder="Example: 20">`;    
}    
}  

// ✅ Generate HTML  
async function generateHTML(){  

let titleLabels = document.querySelectorAll(".title-label");
let titleValues = document.querySelectorAll(".title-value");
let title = titleValues.length > 0 ? titleValues[0].value.trim() : "";

let pdf=document.getElementById("pdf").value.trim();  
let price=document.getElementById("price").value.trim();  
let discount=document.getElementById("discount").value.trim();  
let stock=document.getElementById("stock").value;  

let html="";  

// Images  
if(imageUrls.main){  
html+=`<img src="${imageUrls.main}" style="width:100%;border-radius:10px;">\n\n`;  
}  

imageUrls.list.forEach(u=>{  
html+=`<img src="${u}" style="width:100%;border-radius:10px;">\n\n`;  
});  

// Product Table - NEW FORMAT
if(titleLabels.length > 0 || document.querySelectorAll(".field-label").length > 0){
html += `<table class="custom-table">
<tbody>
<tr>
<th colspan="2">PRODUCT DESCRIPTION</th>
</tr>`;

// Add title fields
for(let i=0;i<titleLabels.length;i++){
if(titleLabels[i].value && titleValues[i].value){
html += `
<tr>
<td class="label">${titleLabels[i].value}</td>
<td class="value">${titleValues[i].value}</td>
</tr>`;
}
}

// Add dynamic fields
let l=document.querySelectorAll(".field-label");
let v=document.querySelectorAll(".field-value");
for(let i=0;i<l.length;i++){
if(l[i].value && v[i].value){
html += `
<tr>
<td class="label">${l[i].value}</td>
<td class="value">${v[i].value}</td>
</tr>`;
}
}
html += `
</tbody>
</table>
`;
}
  
// Other Details  
html+=`<div style="height:40px;"></div>`;  
html+=`<table class="custom-table"><tbody>  
<tr><th>Other Details</th></tr>  
<tr><td>🚚 Delivery within 3-5 Days</td></tr>  
<tr><td>💰 Cash on Delivery</td></tr>  
<tr><td>📦 Full Box</td></tr>  
</tbody></table>\n\n`;  

// PDF  
if(pdf){  
html+=`<div class="post-pdf-link" data-pdf="https://drive.google.com/file/d/${pdf}/preview"></div>\n`;  
}  

// Price + Discount  
if(price) html+=`<strike>regular/${price}</strike>\n`;  
if(discount && discount!=="Stock Out!"){  
html+=`<strike>discount/${discount}</strike>\n`;  
}  

// STOCK CSS    
html+=`<style>    
.instock{display:${stock==="instock"?"block":"none"}!important;}    
.stockout{display:${stock==="stockout"?"block":"none"}!important;}    
</style>`;    
    
document.getElementById("output").value=html;    

// SEO  
let desc = title + " সেরা দামে কিনুন। ক্যাশ অন ডেলিভারি সহ সারা বাংলাদেশে ডেলিভারি।";  
document.getElementById("metaDesc").value = decodeHTML(desc);  

if(title){  
let engTitle = await translateToEnglish(title);  

let slug = engTitle.toLowerCase()  
.replace(/[^a-z0-9\s-]/g,'')  
.replace(/\s+/g,'-')  
.replace(/-+/g,'-')  
.replace(/^-+|-+$/g,'');  

document.getElementById("permalink").value = slug;  
}  

document.getElementById("seoBox").style.display="block";  
}  

// ✅ COPY  
function copyHTML(){  
navigator.clipboard.writeText(document.getElementById("output").value);  
document.getElementById("copyBtn").innerText="Copied!";  
setTimeout(()=>document.getElementById("copyBtn").innerText="📋 Copy",2000);  
}  

// =============================================
// ✅ LOAD FUNCTION - সম্পূর্ণ ঠিক করা হয়েছে
// =============================================
function loadFromHTML() {
    let html = document.getElementById("output").value;
    if (!html) { 
        alert("No HTML Found!"); 
        return; 
    }

    console.log("🔄 Loading HTML for conversion...");

    // --- RESET ALL FIELDS ---
    document.getElementById("dynamicFields").innerHTML = "";
    document.getElementById("imageFields").innerHTML = "";
    imageUrls = { main: "", list: [] };
    document.getElementById("price").value = "";
    document.getElementById("pdf").value = "";
    document.getElementById("metaDesc").value = "";
    document.getElementById("permalink").value = "";
    document.getElementById("discount").value = "";

    // Reset title fields
    document.getElementById("titleFields").innerHTML = `
        <div class="field-group">
            <input type="text" class="title-label" placeholder="Label Name" value="পণ্যের নাম">
            <input type="text" class="title-value" placeholder="Product Name">
        </div>
    `;

    // Reset discount container
    let container = document.getElementById("discountContainer");
    container.innerHTML = `<input type="text" id="discount" placeholder="Example: 20">`;

    // =============================================
    // 1️⃣ EXTRACT TABLE DATA - বিবরণসহ সব কিছু
    // =============================================
    let tableData = extractAllTableData(html);
    console.log("📊 Extracted table data:", tableData);

    if (tableData.length > 0) {
        // First row → Title
        let titleLabel = document.querySelector(".title-label");
        let titleValue = document.querySelector(".title-value");
        if (titleLabel) titleLabel.value = tableData[0].label;
        if (titleValue) titleValue.value = tableData[0].value;

        // Remaining rows → Dynamic fields
        for (let i = 1; i < tableData.length; i++) {
            addField();
            let allGroups = document.querySelectorAll("#dynamicFields .field-group");
            let lastGroup = allGroups[allGroups.length - 1];
            let labelInput = lastGroup.querySelector(".field-label");
            let valueInput = lastGroup.querySelector(".field-value");
            if (labelInput) labelInput.value = tableData[i].label;
            if (valueInput) valueInput.value = tableData[i].value;
        }
        console.log("✅ Table data loaded successfully!");
    }

    // =============================================
    // 2️⃣ EXTRACT IMAGES
    // =============================================
    let imgs = [...html.matchAll(/<img[^>]*src="([^"]*)"[^>]*>/g)];
    console.log("🖼️ Found images:", imgs.length);

    if (imgs.length > 0) {
        imageUrls.main = imgs[0][1];
        let mainStatus = document.querySelector(".field-group .status");
        if (mainStatus) mainStatus.innerHTML = "✅";

        for (let i = 1; i < imgs.length; i++) {
            addImage();
            imageUrls.list.push(imgs[i][1]);
            let allImageGroups = document.querySelectorAll("#imageFields .field-group");
            let lastImageGroup = allImageGroups[allImageGroups.length - 1];
            let statusSpan = lastImageGroup.querySelector(".status");
            if (statusSpan) statusSpan.innerHTML = "✅";
        }
    }

    // =============================================
    // 3️⃣ EXTRACT PRICE
    // =============================================
    let priceMatch = html.match(/regular\/(.*?)<\/strike>/);
    if (priceMatch) {
        document.getElementById("price").value = decodeHTML(priceMatch[1].trim());
        console.log("💰 Price loaded:", priceMatch[1]);
    }

    // =============================================
    // 4️⃣ EXTRACT DISCOUNT
    // =============================================
    let discountMatch = html.match(/discount\/(.*?)<\/strike>/);
    let discountValue = discountMatch ? decodeHTML(discountMatch[1].trim()) : "";
    if (discountValue) {
        document.getElementById("discount").value = discountValue;
        console.log("🏷️ Discount loaded:", discountValue);
    }

    // =============================================
    // 5️⃣ EXTRACT PDF
    // =============================================
    let pdfMatch = html.match(/data-pdf="https:\/\/drive.google.com\/file\/d\/(.*?)\/preview"/);
    if (pdfMatch) {
        document.getElementById("pdf").value = pdfMatch[1];
        console.log("📄 PDF ID loaded:", pdfMatch[1]);
    }

    // =============================================
    // 6️⃣ EXTRACT STOCK STATUS
    // =============================================
    let styleMatch = html.match(/<style>[\s\S]*?\.instock{display:([^}]*)}[\s\S]*?\.stockout{display:([^}]*)}[\s\S]*?<\/style>/);
    if (styleMatch) {
        let inStockDisplay = styleMatch[1]?.trim() || "";
        let stockOutDisplay = styleMatch[2]?.trim() || "";
        
        if (inStockDisplay.includes("block") && stockOutDisplay.includes("none")) {
            document.getElementById("stock").value = "instock";
            let container = document.getElementById("discountContainer");
            container.innerHTML = `<input type="text" id="discount" placeholder="Example: 20">`;
            if (discountValue) document.getElementById("discount").value = discountValue;
            console.log("📦 Stock: In Stock");
        } else if (inStockDisplay.includes("none") && stockOutDisplay.includes("block")) {
            document.getElementById("stock").value = "stockout";
            let container = document.getElementById("discountContainer");
            container.innerHTML = `<select id="discount"><option>Stock Out!</option></select>`;
            console.log("📦 Stock: Stock Out");
        }
    }

    // =============================================
    // 7️⃣ AUTO GENERATE NEW FORMAT
    // =============================================
    console.log("🔄 Auto-generating new format HTML...");
    generateHTML();
    
    alert("✅ পুরাতন HTML থেকে সব ডেটা লোড হয়েছে!");
}

// =============================================
// 📌 উন্নত টেবিল ডেটা এক্সট্রাক্ট - এখন বিবরণও লোড হবে!
// =============================================
function extractAllTableData(html) {
    let data = [];
    
    // 🔹 Try 1: New format (class="label" এবং class="value")
    let newFormatRows = [...html.matchAll(/<td class="label">(.*?)<\/td>\s*<td class="value">(.*?)<\/td>/gs)];
    if (newFormatRows.length > 0) {
        console.log("✅ New format found!");
        for (let row of newFormatRows) {
            let label = decodeHTML(row[1].trim());
            let value = decodeHTML(row[2].trim());
            if (label && value) {
                data.push({ label, value });
            }
        }
        return data;
    }
    
    // 🔹 Try 2: Old format - প্রতিটি TD আলাদাভাবে পার্স করা
    console.log("🔍 Trying old format with improved parsing...");
    
    let tableMatch = html.match(/<table[^>]*>[\s\S]*?PRODUCT DESCRIPTION[\s\S]*?<\/table>/i);
    if (tableMatch) {
        let tableContent = tableMatch[0];
        
        // সমস্ত TD বের করা
        let tdMatches = [...tableContent.matchAll(/<td[^>]*>(.*?)<\/td>/gs)];
        console.log("📝 TD elements found:", tdMatches.length);
        
        let descriptionText = "";
        let hasDescription = false;
        
        for (let i = 0; i < tdMatches.length; i++) {
            let content = decodeHTML(tdMatches[i][1].trim());
            
            // হেডার স্কিপ
            if (content.includes("PRODUCT DESCRIPTION")) continue;
            
            // খালি কন্টেন্ট স্কিপ
            if (!content) continue;
            
            // ⭐ বিবরণ চিহ্নিত করা
            let isDescription = content.includes("বিবরণ") || 
                               content.includes("বিবরণঃ") || 
                               content.includes("বিবরণ:") ||
                               content.includes("বর্ণনা") ||
                               content.includes("বর্ণনাঃ");
            
            // কোলন (:) বা বাংলা কোলন (ঃ) দিয়ে ভাগ করার চেষ্টা
            let colonIndex = content.search(/[:ঃ]/);
            
            if (isDescription) {
                // বিবরণ বিশেষ হ্যান্ডলিং
                if (colonIndex > 0) {
                    let value = content.substring(colonIndex + 1).trim();
                    if (value) {
                        descriptionText = value;
                        hasDescription = true;
                        console.log(`  ✅ Description found: "${value}"`);
                    }
                } else {
                    // "বিবরণ" শব্দটি বাদ দিয়ে বাকি অংশ নেওয়া
                    let value = content.replace(/বিবরণ/g, "").replace(/বর্ণনা/g, "").trim();
                    if (value) {
                        descriptionText = value;
                        hasDescription = true;
                        console.log(`  ✅ Description (cleaned): "${value}"`);
                    }
                }
            }
            else if (colonIndex > 0) {
                // সাধারণ ফিল্ড (Label: Value)
                let label = content.substring(0, colonIndex).trim();
                let value = content.substring(colonIndex + 1).trim();
                if (label && value) {
                    data.push({ label, value });
                    console.log(`  ✅ "${label}" → "${value}"`);
                }
            }
            else {
                // কোলন নেই, কিন্তু বিবরণ হতে পারে
                if (content.length > 20) { // লম্বা টেক্সট = বিবরণ
                    descriptionText = content;
                    hasDescription = true;
                    console.log(`  ✅ Long text as description: "${content.substring(0,50)}..."`);
                }
            }
        }
        
        // বিবরণ যোগ করা
        if (hasDescription && descriptionText) {
            // চেক করুন বিবরণ ইতিমধ্যে আছে কিনা
            let hasExistingDescription = data.some(item => item.label.includes("বিবরণ"));
            if (!hasExistingDescription) {
                data.push({ label: "বিবরণ", value: descriptionText });
            }
        }
    }
    
    // 🔹 Try 3: যদি কোনো ডেটা না পাওয়া যায়, টেক্সট এক্সট্রাক্ট
    if (data.length === 0) {
        console.log("⚠️ No structured data, trying fallback extraction...");
        
        // সব টেক্সট বের করা
        let textContent = html.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
        
        // কোলন দিয়ে লাইন খোঁজা
        let parts = textContent.split(/[।\n\r]/);
        for (let part of parts) {
            let colonIndex = part.search(/[:ঃ]/);
            if (colonIndex > 0) {
                let label = part.substring(0, colonIndex).trim();
                let value = part.substring(colonIndex + 1).trim();
                if (label && value && !label.includes("PRODUCT") && !label.includes("Other")) {
                    data.push({ label, value });
                }
            }
        }
        
        // এখনও বিবরণ না পেলে
        if (!data.some(item => item.label.includes("বিবরণ"))) {
            let descMatch = textContent.match(/বিবরণ[:ঃ]\s*([^।]*)/);
            if (descMatch) {
                data.push({ label: "বিবরণ", value: descMatch[1].trim() });
            }
        }
    }
    
    console.log(`📊 Total data extracted: ${data.length} rows`);
    return data;
}

// Translate  
async function translateToEnglish(text){  
let url="https://translate.googleapis.com/translate_a/single?client=gtx&sl=bn&tl=en&dt=t&q="+encodeURIComponent(text);  
let res=await fetch(url);  
let data=await res.json();  
return data[0].map(x=>x[0]).join("");  
}  
    
</script>
